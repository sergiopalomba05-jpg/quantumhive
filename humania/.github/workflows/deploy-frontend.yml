name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'humania/frontend/**'
  workflow_dispatch:

env:
  PROJECT_ID: project-aa5fb956-b08a-4e13-869
  REGION: us-central1
  SERVICE_NAME: humania-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: humania/frontend
        run: npm ci

      - name: Build
        working-directory: humania/frontend
        run: npm run build
        env:
          VITE_WS_URL: wss://humania-${{ github.run_id }}.run.app

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Storage
        run: |
          gsutil -m rsync -r -d humania/frontend/dist gs://${{ env.SERVICE_NAME }}-assets

      - name: Set up CORS
        run: |
          cat > /tmp/cors.json << EOF
          [
            {
              "origin": ["*"],
              "method": ["GET"],
              "responseHeader": ["Content-Type"],
              "maxAgeSeconds": 3600
            }
          ]
          EOF
          gsutil cors set /tmp/cors.json gs://${{ env.SERVICE_NAME }}-assets
