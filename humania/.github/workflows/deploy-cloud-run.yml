name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'humania/**'
  workflow_dispatch:

env:
  PROJECT_ID: project-aa5fb956-b08a-4e13-869
  REGION: us-central1
  SERVICE_NAME: humania
  AR_REPO: humania-artifacts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$AR_REPO/$SERVICE_NAME:${{ github.sha }} \
            -f humania/Dockerfile \
            humania/

          docker push us-central1-docker.pkg.dev/$PROJECT_ID/$AR_REPO/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$AR_REPO/$SERVICE_NAME:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 8Gi \
            --cpu 4 \
            --gpu 1 \
            --gpu-type nvidia-l4 \
            --max-instances 10 \
            --min-instances 0 \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --set-env-vars="GOOGLE_CLOUD_LOCATION=$REGION"

      - name: Show Deployment URL
        run: |
          echo "Deployed to:"
          gcloud run services describe $SERVICE_NAME --region $REGION --format='value(status.url)'
